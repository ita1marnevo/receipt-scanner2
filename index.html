<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Receipt Scanner</title>
  <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: Arial, sans-serif; }
    body { background: #f0f2f5; display: flex; justify-content: center; padding: 30px 16px; }
    .container { width: 100%; max-width: 540px; }
    h1 { text-align: center; color: #333; margin-bottom: 24px; }
    .card { background: white; border-radius: 12px; padding: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); margin-bottom: 20px; }
    .card h3 { margin-bottom: 14px; color: #111; }
    input[type=text], input[type=email], input[type=password],
    input[type=number], input[type=date], select {
      width: 100%; padding: 10px 14px; border: 1px solid #ddd;
      border-radius: 8px; margin-bottom: 10px; font-size: 14px; background: white;
    }
    button { width: 100%; padding: 11px; border: none; border-radius: 8px; cursor: pointer; font-size: 14px; font-weight: bold; margin-bottom: 8px; }
    .btn-primary  { background: #4f46e5; color: white; }
    .btn-secondary{ background: #e5e7eb; color: #333; }
    .btn-logout   { background: #fee2e2; color: #dc2626; }
    .btn-upload   { background: #10b981; color: white; }
    .btn-excel    { background: #16a34a; color: white; }
    .btn-clear    { background: #f3f4f6; color: #555; }
    .btn-delete   { background: none; border: none; color: #dc2626; cursor: pointer; font-size: 18px; padding: 0; width: auto; margin: 0; }
    .row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .row2 > * { margin-bottom: 0; }
    .row3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-bottom: 10px; }
    .receipt-item { border: 1px solid #e5e7eb; border-radius: 8px; padding: 10px 12px; margin-bottom: 10px; display: flex; gap: 12px; align-items: center; }
    .receipt-item img { width: 60px; height: 60px; object-fit: cover; border-radius: 6px; flex-shrink: 0; }
    .receipt-info { flex: 1; }
    .receipt-info strong { font-size: 15px; color: #111; }
    .receipt-info p { font-size: 12px; color: #666; margin-top: 3px; }
    .cat-badge { display: inline-block; background: #ede9fe; color: #4f46e5; font-size: 11px; padding: 2px 8px; border-radius: 12px; margin-top: 3px; }
    .msg { text-align: center; font-size: 13px; color: #6b7280; margin-top: 6px; }
    .error { color: #dc2626; }
    #auth-section, #app-section { display: none; }
    label.upload-label { display: block; border: 2px dashed #4f46e5; border-radius: 8px; padding: 18px; text-align: center; cursor: pointer; color: #4f46e5; margin-bottom: 10px; font-size: 14px; }
    #preview { width: 100%; border-radius: 8px; margin-bottom: 10px; display: none; }
    .summary-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }
    .summary-box { background: #f9fafb; border-radius: 8px; padding: 12px; text-align: center; }
    .summary-box span { display: block; font-size: 11px; color: #888; margin-bottom: 4px; }
    .summary-box strong { font-size: 18px; color: #4f46e5; }
    .filter-section { border-top: 1px solid #f0f0f0; padding-top: 14px; margin-top: 4px; }
    .filter-section h4 { font-size: 13px; color: #888; margin-bottom: 10px; }
    .search-bar { display: flex; gap: 8px; margin-bottom: 10px; }
    .search-bar input { margin-bottom: 0; flex: 1; }
    .search-bar button { width: auto; padding: 10px 16px; margin-bottom: 0; }
  </style>
</head>
<body>
<div class="container">
  <h1>🧾 Receipt Scanner</h1>

  <!-- AUTH -->
  <div class="card" id="auth-section">
    <input id="email" type="email" placeholder="אימייל"/>
    <input id="password" type="password" placeholder="סיסמה"/>
    <button class="btn-primary" onclick="login()">התחבר</button>
    <button class="btn-secondary" onclick="register()">הרשמה</button>
    <p class="msg error" id="auth-error"></p>
  </div>

  <!-- APP -->
  <div id="app-section">
    <button class="btn-logout" onclick="logout()">🚪 התנתק</button>

    <!-- SUMMARY -->
    <div class="card">
      <h3>📊 סיכום הוצאות</h3>
      <div class="summary-grid">
        <div class="summary-box"><span>קבלות</span><strong id="s-count">-</strong></div>
        <div class="summary-box"><span>סה"כ</span><strong id="s-total">-</strong></div>
        <div class="summary-box"><span>ממוצע</span><strong id="s-avg">-</strong></div>
      </div>
    </div>

    <!-- UPLOAD -->
    <div class="card">
      <h3>➕ הוסף קבלה</h3>
      <label class="upload-label" for="file-input">📷 לחץ לבחירת תמונה</label>
      <input id="file-input" type="file" accept="image/*" style="display:none" onchange="previewImage(event)"/>
      <img id="preview"/>
      <input id="receipt-name" type="text" placeholder="שם הקבלה"/>
      <div class="row2" style="margin-bottom:10px">
        <input id="receipt-amount" type="number" placeholder="סכום (₪)" style="margin-bottom:0"/>
        <select id="receipt-category">
          <option value="">-- קטגוריה --</option>
          <option>🛒 סופרמרקט</option>
          <option>⛽ דלק</option>
          <option>🍽️ מסעדה</option>
          <option>👕 בגדים</option>
          <option>💊 תרופות/בריאות</option>
          <option>🔌 חשמל/חשבונות</option>
          <option>🎉 בילויים</option>
          <option>📦 אחר</option>
        </select>
      </div>
      <button class="btn-upload" onclick="uploadReceipt()">⬆️ שמור קבלה</button>
      <p class="msg" id="upload-msg"></p>
    </div>

    <!-- RECEIPTS -->
    <div class="card">
      <h3>📋 הקבלות שלי</h3>

      <!-- Search -->
      <div class="search-bar">
        <input id="search-input" type="text" placeholder="🔍 חפש לפי שם..." oninput="applyFilters()"/>
      </div>

      <!-- Filters -->
      <div class="filter-section">
        <h4>🎛️ סינון מתקדם</h4>
        <div class="row2" style="margin-bottom:10px">
          <input id="filter-from" type="date" title="מתאריך" onchange="applyFilters()" style="margin-bottom:0"/>
          <input id="filter-to"   type="date" title="עד תאריך" onchange="applyFilters()" style="margin-bottom:0"/>
        </div>
        <select id="filter-category" onchange="applyFilters()">
          <option value="">כל הקטגוריות</option>
          <option>🛒 סופרמרקט</option>
          <option>⛽ דלק</option>
          <option>🍽️ מסעדה</option>
          <option>👕 בגדים</option>
          <option>💊 תרופות/בריאות</option>
          <option>🔌 חשמל/חשבונות</option>
          <option>🎉 בילויים</option>
          <option>📦 אחר</option>
        </select>
        <button class="btn-clear" onclick="clearFilters()">✖️ נקה סינון</button>
      </div>

      <div id="receipts-list" style="margin-top:14px"><p class="msg">טוען...</p></div>

      <!-- Export -->
      <button class="btn-excel" onclick="exportExcel()" style="margin-top:10px">📥 ייצוא לאקסל</button>
    </div>
  </div>
</div>

<script type="module">
// Code Generated by Sidekick is for learning and experimentation purposes only.
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, signOut, onAuthStateChanged }
  from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import { getFirestore, collection, addDoc, deleteDoc, doc, query, where, getDocs }
  from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDkxJQxvwY1ZvNkqIpcgkgeRMkkbnfHLu4",
  authDomain: "receipt-scanner-9a8d6.firebaseapp.com",
  projectId: "receipt-scanner-9a8d6",
  storageBucket: "receipt-scanner-9a8d6.firebasestorage.app",
  messagingSenderId: "954573164722",
  appId: "1:954573164722:web:33a9e330c8e851aa58b9ab"
};

const CLOUD_NAME = "root";
const UPLOAD_PRESET = "receipt_upload";

const app  = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db   = getFirestore(app);

let currentUser = null;
let allReceipts  = [];
let filtered     = [];

onAuthStateChanged(auth, user => {
  currentUser = user;
  document.getElementById("auth-section").style.display = user ? "none"  : "block";
  document.getElementById("app-section").style.display  = user ? "block" : "none";
  if (user) loadReceipts();
});

// ── Auth ──────────────────────────────────────────────
window.login = async () => {
  const email = document.getElementById("email").value;
  const pass  = document.getElementById("password").value;
  try { await signInWithEmailAndPassword(auth, email, pass); }
  catch (e) { document.getElementById("auth-error").textContent = "שגיאה: " + e.message; }
};

window.register = async () => {
  const email = document.getElementById("email").value;
  const pass  = document.getElementById("password").value;
  try { await createUserWithEmailAndPassword(auth, email, pass); }
  catch (e) { document.getElementById("auth-error").textContent = "שגיאה: " + e.message; }
};

window.logout = () => signOut(auth);

// ── Upload ────────────────────────────────────────────
window.previewImage = (e) => {
  const file = e.target.files[0];
  if (!file) return;
  const p = document.getElementById("preview");
  p.src = URL.createObjectURL(file);
  p.style.display = "block";
};

window.uploadReceipt = async () => {
  const file     = document.getElementById("file-input").files[0];
  const name     = document.getElementById("receipt-name").value.trim();
  const amount   = document.getElementById("receipt-amount").value.trim();
  const category = document.getElementById("receipt-category").value;
  const msg      = document.getElementById("upload-msg");

  if (!file || !name || !amount || !category) { msg.textContent = "⚠️ מלא את כל השדות כולל קטגוריה"; return; }
  msg.textContent = "מעלה...";

  try {
    const formData = new FormData();
    formData.append("file", file);
    formData.append("upload_preset", UPLOAD_PRESET);
    const res  = await fetch(`https://api.cloudinary.com/v1_1/${CLOUD_NAME}/image/upload`, { method: "POST", body: formData });
    const data = await res.json();
    if (!data.secure_url) throw new Error("שגיאת Cloudinary");

    await addDoc(collection(db, "receipts"), {
      userId: currentUser.uid, name, amount: parseFloat(amount),
      category, imageUrl: data.secure_url, createdAt: new Date().toISOString()
    });

    msg.textContent = "✅ הקבלה נשמרה!";
    ["receipt-name","receipt-amount"].forEach(id => document.getElementById(id).value = "");
    document.getElementById("receipt-category").value = "";
    document.getElementById("preview").style.display = "none";
    document.getElementById("file-input").value = "";
    loadReceipts();
  } catch (e) { msg.textContent = "❌ שגיאה: " + e.message; }
};

// ── Delete ────────────────────────────────────────────
window.deleteReceipt = async (id) => {
  if (!confirm("למחוק את הקבלה?")) return;
  try { await deleteDoc(doc(db, "receipts", id)); loadReceipts(); }
  catch (e) { alert("שגיאה במחיקה: " + e.message); }
};

// ── Load & Filter ─────────────────────────────────────
async function loadReceipts() {
  document.getElementById("receipts-list").innerHTML = "<p class='msg'>טוען...</p>";
  try {
    const snap = await getDocs(query(collection(db, "receipts"), where("userId", "==", currentUser.uid)));
    allReceipts = [];
    snap.forEach(d => allReceipts.push({ id: d.id, ...d.data() }));
    allReceipts.sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt));
    applyFilters();
  } catch (e) {
    document.getElementById("receipts-list").innerHTML = `<p class='msg error'>שגיאה: ${e.message}</p>`;
  }
}

window.applyFilters = () => {
  const search  = document.getElementById("search-input").value.trim().toLowerCase();
  const from    = document.getElementById("filter-from").value;
  const to      = document.getElementById("filter-to").value;
  const cat     = document.getElementById("filter-category").value;

  filtered = allReceipts.filter(r => {
    const date = r.createdAt.slice(0, 10);
    return (!search  || r.name.toLowerCase().includes(search))
        && (!from    || date >= from)
        && (!to      || date <= to)
        && (!cat     || r.category === cat);
  });

  updateSummary(filtered);
  renderList(filtered);
};

window.clearFilters = () => {
  ["search-input","filter-from","filter-to"].forEach(id => document.getElementById(id).value = "");
  document.getElementById("filter-category").value = "";
  applyFilters();
};

function updateSummary(list) {
  const total = list.reduce((s, r) => s + r.amount, 0);
  document.getElementById("s-count").textContent = list.length;
  document.getElementById("s-total").textContent = `₪${total.toFixed(0)}`;
  document.getElementById("s-avg").textContent   = list.length ? `₪${(total / list.length).toFixed(0)}` : "-";
}

function renderList(list) {
  const el = document.getElementById("receipts-list");
  if (!list.length) { el.innerHTML = "<p class='msg'>לא נמצאו קבלות</p>"; return; }
  el.innerHTML = list.map(r => `
    <div class="receipt-item">
      <img src="${r.imageUrl}" alt="קבלה"/>
      <div class="receipt-info">
        <strong>${r.name}</strong>
        <span class="cat-badge">${r.category || "ללא קטגוריה"}</span>
        <p>💰 ₪${r.amount} &nbsp;|&nbsp; 📅 ${new Date(r.createdAt).toLocaleDateString("he-IL")}</p>
      </div>
      <button class="btn-delete" onclick="deleteReceipt('${r.id}')" title="מחק">🗑️</button>
    </div>`).join("");
}

// ── Export Excel ──────────────────────────────────────
window.exportExcel = () => {
  if (!filtered.length) { alert("אין קבלות לייצוא"); return; }
  const rows = filtered.map(r => ({
    "שם קבלה":   r.name,
    "קטגוריה":   r.category || "",
    "סכום (₪)":  r.amount,
    "תאריך":     new Date(r.createdAt).toLocaleDateString("he-IL"),
    "קישור לתמונה": r.imageUrl
  }));
  const ws = XLSX.utils.json_to_sheet(rows);
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, "קבלות");
  XLSX.writeFile(wb, "receipts.xlsx");
};
</script>
</body>
</html>
