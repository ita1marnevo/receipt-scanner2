<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
<title>סורק קבלות</title>
<script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:Arial,sans-serif}
body{background:#f0f2f5;display:flex;justify-content:center;padding:20px 12px;min-height:100vh}
.wrap{width:100%;max-width:560px}
h1{text-align:center;color:#333;margin-bottom:20px;font-size:22px}
.card{background:#fff;border-radius:12px;padding:18px;box-shadow:0 2px 8px rgba(0,0,0,.08);margin-bottom:16px}
.card h3{margin-bottom:14px;color:#111;font-size:16px}
input,select,textarea{width:100%;padding:10px 12px;border:1px solid #ddd;border-radius:8px;
  margin-bottom:10px;font-size:14px;background:#fff;font-family:Arial,sans-serif}
textarea{height:60px;resize:vertical}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px}
.row2>*{margin-bottom:0}
button{width:100%;padding:10px;border:none;border-radius:8px;cursor:pointer;
  font-size:14px;font-weight:bold;margin-bottom:8px}
.bp{background:#4f46e5;color:#fff} .bs{background:#e5e7eb;color:#333}
.bg{background:#10b981;color:#fff} .be{background:#16a34a;color:#fff}
.br{background:#fee2e2;color:#dc2626} .bc{background:#f3f4f6;color:#555}
.bd{background:none;border:none;color:#dc2626;cursor:pointer;width:auto;margin:0;padding:4px 8px;font-size:18px}

/* tabs */
.tabs{display:flex;gap:8px;margin-bottom:12px}
.tab{flex:1;padding:9px;border:2px solid #ddd;border-radius:8px;background:#fff;
  color:#555;cursor:pointer;font-size:13px;font-weight:bold}
.tab.on{border-color:#4f46e5;color:#4f46e5;background:#ede9fe}

/* camera */
#cam-box{position:relative;width:100%;aspect-ratio:4/3;background:#000;
  border-radius:10px;overflow:hidden;touch-action:none}
#video{width:100%;height:100%;object-fit:cover;display:block}
#focus-ring{position:absolute;width:56px;height:56px;border:2px solid #fff;
  border-radius:50%;pointer-events:none;display:none;transform:translate(-50%,-50%);
  box-shadow:0 0 0 2px rgba(0,0,0,.5);transition:opacity .4s}
.cam-ctrl{display:flex;align-items:center;gap:8px;margin-top:8px}
.cam-ctrl button{margin:0;width:auto;padding:8px 14px;font-size:18px}
.zoom-wrap{flex:1;display:flex;align-items:center;gap:6px;font-size:12px;color:#666}
.zoom-wrap input{flex:1;margin:0;padding:0;border:none;background:none}
#snap-btn{background:#4f46e5;color:#fff;border-radius:50%;width:52px!important;
  height:52px;font-size:22px;padding:0;display:flex;align-items:center;justify-content:center}
#canvas{display:none}
#preview{width:100%;border-radius:8px;margin-bottom:10px;display:none;max-height:220px;object-fit:cover}
.upload-lbl{display:block;border:2px dashed #4f46e5;border-radius:8px;padding:16px;
  text-align:center;cursor:pointer;color:#4f46e5;margin-bottom:10px;font-size:14px}

/* OCR status */
#ocr-status{font-size:12px;color:#4f46e5;text-align:center;min-height:18px;margin-bottom:8px}

/* list */
.rec-item{border:1px solid #e5e7eb;border-radius:8px;padding:10px 12px;
  margin-bottom:10px;display:flex;gap:10px;align-items:flex-start}
.rec-item img{width:58px;height:58px;object-fit:cover;border-radius:6px;flex-shrink:0}
.rec-info{flex:1;font-size:13px}
.rec-info strong{font-size:14px;color:#111}
.rec-info p{color:#666;margin-top:3px;line-height:1.5}
.badge{display:inline-block;background:#ede9fe;color:#4f46e5;
  font-size:11px;padding:2px 8px;border-radius:12px;margin-top:3px}
.msg{text-align:center;font-size:13px;color:#6b7280;margin-top:6px}
.err{color:#dc2626}
.sum-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
.sum-box{background:#f9fafb;border-radius:8px;padding:10px;text-align:center}
.sum-box span{display:block;font-size:11px;color:#888;margin-bottom:4px}
.sum-box strong{font-size:17px;color:#4f46e5}
label.lbl{font-size:12px;color:#888;margin-bottom:3px;display:block}
</style>
</head>
<body>
<div class="wrap">
<h1>🧾 סורק קבלות</h1>

<!-- summary -->
<div class="card">
  <h3>📊 סיכום</h3>
  <div class="sum-grid">
    <div class="sum-box"><span>קבלות</span><strong id="s-n">0</strong></div>
    <div class="sum-box"><span>לפני מע"מ</span><strong id="s-pre">₪0</strong></div>
    <div class="sum-box"><span>אחרי מע"מ</span><strong id="s-post">₪0</strong></div>
  </div>
</div>

<!-- add receipt -->
<div class="card">
  <h3>➕ הוסף קבלה</h3>
  <div class="tabs">
    <button class="tab on" id="t-file"   onclick="swTab('file')">📁 קובץ / גלריה</button>
    <button class="tab"    id="t-cam"    onclick="swTab('cam')">📷 מצלמה</button>
  </div>

  <!-- file -->
  <div id="sec-file">
    <label class="upload-lbl" for="file-in">📁 לחץ לבחירת תמונה</label>
    <input id="file-in" type="file" accept="image/*" style="display:none" onchange="onFile(event)"/>
  </div>

  <!-- camera -->
  <div id="sec-cam" style="display:none">
    <div id="cam-box">
      <video id="video" autoplay playsinline muted></video>
      <div id="focus-ring"></div>
    </div>
    <canvas id="canvas"></canvas>
    <div class="cam-ctrl">
      <button class="bs" style="border-radius:8px" onclick="flipCam()" title="הפוך">🔄</button>
      <div class="zoom-wrap">
        <span>−</span>
        <input type="range" id="zslider" min="1" max="5" step="0.1" value="1" oninput="setZoom(+this.value)"/>
        <span>+</span>
        <span id="zlbl">×1.0</span>
      </div>
      <button id="snap-btn" onclick="snap()" title="צלם">📸</button>
    </div>
  </div>

  <!-- preview -->
  <img id="preview"/>
  <div id="ocr-status"></div>

  <!-- fields -->
  <label class="lbl">תאריך הוצאה</label>
  <input id="f-date" type="date"/>

  <label class="lbl">סוג הוצאה</label>
  <select id="f-type">
    <option value="">-- בחר סוג --</option>
    <option>🚗 רכב</option>
    <option>📎 משרדיות</option>
    <option>🏠 בית</option>
    <option>👕 ביגוד</option>
    <option>📦 אחר</option>
  </select>

  <label class="lbl">תיאור ההוצאה</label>
  <textarea id="f-desc" placeholder="תיאור חופשי..."></textarea>

  <label class="lbl">שם בית העסק</label>
  <input id="f-biz" type="text" placeholder="יזוהה אוטומטית מ-OCR"/>

  <div class="row2">
    <div>
      <label class="lbl">מספר חשבונית</label>
      <input id="f-inv" type="text" placeholder="מ-OCR / ידני" style="margin-bottom:0"/>
    </div>
    <div>
      <label class="lbl">סכום לפני מע"מ (₪)</label>
      <input id="f-pre" type="number" placeholder="0.00" style="margin-bottom:0"/>
    </div>
  </div>
  <label class="lbl" style="margin-top:10px">סכום אחרי מע"מ (₪)</label>
  <input id="f-post" type="number" placeholder="יחושב אוטומטית אם ריק"/>

  <button class="bg" style="margin-top:6px" onclick="saveReceipt()">💾 שמור קבלה</button>
  <p class="msg" id="save-msg"></p>
</div>

<!-- list -->
<div class="card">
  <h3>📋 קבלות שמורות</h3>
  <input id="srch" type="text" placeholder="🔍 חפש..." oninput="render()"/>
  <div id="list"><p class="msg">אין קבלות עדיין</p></div>
  <button class="be" onclick="exportXL()" style="margin-top:6px">📥 ייצוא לאקסל</button>
  <button class="bc" onclick="clearAll()" style="margin-top:0">🗑️ נקה הכל</button>
</div>
</div>

<script>
// Code Generated by Sidekick is for learning and experimentation purposes only.
const STORE = 'receipts_v2';
let receipts = JSON.parse(localStorage.getItem(STORE) || '[]');
let imgBlob   = null;
let stream    = null;
let vTrack    = null;
let facing    = 'environment';
let zoom      = 1;
let pinchD0   = null, pinchZ0 = 1;

// ── tabs ──────────────────────────────────────────────
function swTab(t){
  const isCam = t==='cam';
  document.getElementById('sec-file').style.display = isCam?'none':'block';
  document.getElementById('sec-cam').style.display  = isCam?'block':'none';
  document.getElementById('t-file').classList.toggle('on',!isCam);
  document.getElementById('t-cam').classList.toggle('on', isCam);
  isCam ? startCam() : stopCam();
}

// ── camera ────────────────────────────────────────────
async function startCam(){
  try {
    stopCam();
    stream = await navigator.mediaDevices.getUserMedia({
      video:{facingMode:facing, width:{ideal:1920}, height:{ideal:1080}}, audio:false
    });
    const v = document.getElementById('video');
    v.srcObject = stream;
    await v.play();
    vTrack = stream.getVideoTracks()[0];
    zoom=1;
    document.getElementById('zslider').value=1;
    document.getElementById('zlbl').textContent='×1.0';
    v.style.transform='';
    bindTouch();
  } catch(e){ alert('שגיאת מצלמה: '+e.message); }
}

function stopCam(){
  if(stream){ stream.getTracks().forEach(t=>t.stop()); stream=null; vTrack=null; }
}

function flipCam(){ facing = facing==='environment'?'user':'environment'; startCam(); }

function setZoom(v){
  zoom=v;
  document.getElementById('zlbl').textContent='×'+v.toFixed(1);
  if(!vTrack) return;
  const caps=vTrack.getCapabilities?.();
  if(caps?.zoom){
    vTrack.applyConstraints({advanced:[{zoom:Math.min(Math.max(v,caps.zoom.min),caps.zoom.max)}]}).catch(()=>{});
  } else {
    document.getElementById('video').style.transform=`scale(${v})`;
  }
}

function bindTouch(){
  const box=document.getElementById('cam-box');
  box.onclick=e=>{
    const r=box.getBoundingClientRect();
    showFocus(e.clientX-r.left, e.clientY-r.top);
    if(!vTrack) return;
    const x=(e.clientX-r.left)/r.width, y=(e.clientY-r.top)/r.height;
    vTrack.applyConstraints({advanced:[{pointsOfInterest:[{x,y}]},{focusMode:'manual'}]}).catch(()=>{});
  };
  box.addEventListener('touchstart',e=>{
    if(e.touches.length===2){ pinchD0=dist2(e); pinchZ0=zoom; }
  },{passive:true});
  box.addEventListener('touchmove',e=>{
    if(e.touches.length===2&&pinchD0){
      const nz=Math.min(Math.max(pinchZ0*(dist2(e)/pinchD0),1),5);
      document.getElementById('zslider').value=nz;
      setZoom(nz);
    }
  },{passive:true});
  box.addEventListener('touchend',()=>pinchD0=null,{passive:true});
}

function dist2(e){
  const dx=e.touches[0].clientX-e.touches[1].clientX;
  const dy=e.touches[0].clientY-e.touches[1].clientY;
  return Math.sqrt(dx*dx+dy*dy);
}

function showFocus(x,y){
  const r=document.getElementById('focus-ring');
  r.style.left=x+'px'; r.style.top=y+'px';
  r.style.display='block'; r.style.opacity='1';
  setTimeout(()=>{ r.style.opacity='0'; setTimeout(()=>r.style.display='none',400); },800);
}

function snap(){
  const v=document.getElementById('video');
  const c=document.getElementById('canvas');
  c.width=v.videoWidth||640; c.height=v.videoHeight||480;
  c.getContext('2d').drawImage(v,0,0);
  c.toBlob(b=>{ imgBlob=b; showPreview(b); runOCR(b); },'image/jpeg',0.92);
  stopCam();
  document.getElementById('sec-cam').style.display='none';
  document.getElementById('t-file').classList.add('on');
  document.getElementById('t-cam').classList.remove('on');
}

function onFile(e){
  const f=e.target.files[0]; if(!f) return;
  imgBlob=f; showPreview(f); runOCR(f);
}

function showPreview(blob){
  const p=document.getElementById('preview');
  p.src=URL.createObjectURL(blob); p.style.display='block';
}

// ── OCR ───────────────────────────────────────────────
async function runOCR(blob){
  const st=document.getElementById('ocr-status');
  st.textContent='🔍 מנתח קבלה...';
  try {
    const { data:{text} } = await Tesseract.recognize(blob,['heb','eng'],{logger:()=>{}});
    fillFromOCR(text);
    st.textContent='✅ זיהוי הושלם';
  } catch(e){ st.textContent='⚠️ OCR נכשל — מלא ידנית'; }
}

function fillFromOCR(txt){
  // invoice number
  const invM = txt.match(/(?:חשבונית|invoice|inv[#\s.:]*|מס['\s]*[.:])[\s#:]*(\d{4,})/i);
  if(invM) document.getElementById('f-inv').value = invM[1];

  // amounts — find all currency-like numbers
  const amounts = [...txt.matchAll(/(?:₪|nis|ils|ש"ח)?\s*([\d,]+\.?\d{0,2})\s*(?:₪|nis|ils|ש"ח)?/gi)]
    .map(m=>parseFloat(m[1].replace(',',''))).filter(n=>n>0).sort((a,b)=>b-a);

  if(amounts.length>=2){
    const post=amounts[0], pre=amounts[1];
    document.getElementById('f-post').value=post.toFixed(2);
    document.getElementById('f-pre').value=pre.toFixed(2);
  } else if(amounts.length===1){
    const post=amounts[0];
    document.getElementById('f-post').value=post.toFixed(2);
    document.getElementById('f-pre').value=(post/1.17).toFixed(2);
  }

  // business name — first non-empty line
  const lines=txt.split('\n').map(l=>l.trim()).filter(l=>l.length>2);
  if(lines.length){ document.getElementById('f-biz').value=lines[0].substring(0,60); }

  // date
  const dateM=txt.match(/(\d{1,2})[\/\.\-](\d{1,2})[\/\.\-](\d{2,4})/);
  if(dateM){
    const [,d,m,y]=dateM;
    const fy=y.length===2?'20'+y:y;
    document.getElementById('f-date').value=`${fy}-${m.padStart(2,'0')}-${d.padStart(2,'0')}`;
  }
}

// auto-calc VAT on pre-tax blur
document.addEventListener('DOMContentLoaded',()=>{
  document.getElementById('f-pre').addEventListener('blur',()=>{
    const v=parseFloat(document.getElementById('f-pre').value);
    if(v&&!document.getElementById('f-post').value)
      document.getElementById('f-post').value=(v*1.17).toFixed(2);
  });
  render(); updateSum();
  // set today as default date
  document.getElementById('f-date').value=new Date().toISOString().slice(0,10);
});

// ── save ──────────────────────────────────────────────
async function saveReceipt(){
  const msg=document.getElementById('save-msg');
  const pre=parseFloat(document.getElementById('f-pre').value)||0;
  const post=parseFloat(document.getElementById('f-post').value)||0;
  if(!imgBlob){ msg.textContent='⚠️ יש לצרף תמונה'; return; }
  if(!document.getElementById('f-type').value){ msg.textContent='⚠️ בחר סוג הוצאה'; return; }
  msg.textContent='שומר...';
  const reader=new FileReader();
  reader.onload=()=>{
    const rec={
      id: Date.now(),
      date: document.getElementById('f-date').value,
      type: document.getElementById('f-type').value,
      desc: document.getElementById('f-desc').value.trim(),
      biz:  document.getElementById('f-biz').value.trim(),
      inv:  document.getElementById('f-inv').value.trim(),
      pre, post,
      img: reader.result
    };
    receipts.unshift(rec);
    persist(); resetForm();
    msg.textContent='✅ נשמר!';
    render(); updateSum();
  };
  reader.readAsDataURL(imgBlob);
}

function resetForm(){
  ['f-date','f-type','f-desc','f-biz','f-inv','f-pre','f-post'].forEach(id=>
    document.getElementById(id).value='');
  document.getElementById('f-date').value=new Date().toISOString().slice(0,10);
  document.getElementById('preview').style.display='none';
  document.getElementById('ocr-status').textContent='';
  document.getElementById('file-in').value='';
  imgBlob=null;
}

function deleteRec(id){
  if(!confirm('למחוק?')) return;
  receipts=receipts.filter(r=>r.id!==id);
  persist(); render(); updateSum();
}

function clearAll(){
  if(!confirm('למחוק את כל הקבלות?')) return;
  receipts=[]; persist(); render(); updateSum();
}

function persist(){ localStorage.setItem(STORE,JSON.stringify(receipts)); }

// ── render list ───────────────────────────────────────
function render(){
  const q=document.getElementById('srch').value.toLowerCase();
  const list=receipts.filter(r=>
    r.biz.toLowerCase().includes(q)||r.desc.toLowerCase().includes(q)||r.type.toLowerCase().includes(q)
  );
  const el=document.getElementById('list');
  if(!list.length){ el.innerHTML="<p class='msg'>אין קבלות</p>"; return; }
  el.innerHTML=list.map(r=>`
    <div class="rec-item">
      <img src="${r.img}" alt="קבלה"/>
      <div class="rec-info">
        <strong>${r.biz||'(ללא שם)'}</strong>
        <span class="badge">${r.type}</span>
        <p>📅 ${r.date} | חשבונית: ${r.inv||'—'}</p>
        <p>לפני מע"מ: ₪${r.pre.toFixed(2)} | אחרי: ₪${r.post.toFixed(2)}</p>
        ${r.desc?`<p>📝 ${r.desc}</p>`:''}
      </div>
      <button class="bd" onclick="deleteRec(${r.id})">🗑️</button>
    </div>`).join('');
}

function updateSum(){
  document.getElementById('s-n').textContent=receipts.length;
  document.getElementById('s-pre').textContent='₪'+receipts.reduce((s,r)=>s+r.pre,0).toFixed(0);
  document.getElementById('s-post').textContent='₪'+receipts.reduce((s,r)=>s+r.post,0).toFixed(0);
}

// ── Excel export ──────────────────────────────────────
function exportXL(){
  if(!receipts.length){ alert('אין קבלות לייצוא'); return; }
  const rows=receipts.map(r=>({
    'תאריך הוצאה':       r.date,
    'סוג הוצאה':         r.type,
    'תיאור ההוצאה':      r.desc,
    'שם בית העסק':       r.biz,
    'מספר חשבונית':      r.inv,
    'סכום לפני מע"מ':    r.pre,
    'סכום אחרי מע"מ':   r.post
  }));
  const ws=XLSX.utils.json_to_sheet(rows);
  ws['!cols']=[12,14,22,20,14,16,16].map(w=>({wch:w}));
  const wb=XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb,ws,'קבלות');
  XLSX.writeFile(wb,'receipts.xlsx');
}
</script>
</body>
</html>
